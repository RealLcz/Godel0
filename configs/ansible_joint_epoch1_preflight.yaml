run:
  seed: 7301
  run_name: "ansible_joint_epoch1_preflight"
  max_nodes: 1
  max_expansions: 20

models:
  agent_model: "Qwen/Qwen3.6-35B-A3B"
  diagnose_model: "Qwen/Qwen3.6-35B-A3B"
  temperature: 0.0
  max_tokens: 8192

agent:
  max_steps: 100
  max_tool_errors: 5
  trajectory_format: "jsonl"
  self_evolve_timeout_sec: 1800

tasks:
  batch_size: 10
  max_generation_candidates: 50
  candidates_per_signature: 5
  allow_same_repo_transfer: true
  allow_cross_repo_transfer: false

scoring:
  regression_threshold: 0.8
  regression_weight: 0.5
  proposer_target_accuracy: 0.5
  min_parent_solved_tasks: 3

evaluation:
  solver_rollouts: 1
  deterministic: true
  level1_timeout_sec: 1200
  level2_timeout_sec: 1200
  max_workers: 1

proposer:
  strategies:
    repo_chain: 1.0
  candidate_timeout_sec: 900
  max_patch_lines: 200
  forbid_test_file_edits: true
  require_f2p: true
  contract_test_renderer: existing_test

execution:
  backend: "subprocess"
  scratch_root: "./scratch_ansible_joint_epoch1_preflight_v1"
  clean_env: true
  network_disabled: true

paths:
  agent_repo: "./agent_repo_ansible_joint_epoch1_preflight_v1"
  repo_pool: "./repo_pool"
  runs: "./runs_ansible_joint_epoch1_preflight_v1"
  task_store: "./task_store_ansible_joint_epoch1_preflight_v1"
