run:
  seed: 7301
  run_name: "repo_chain_evolve20"
  max_nodes: 20
  max_expansions: 20

models:
  agent_model: "Qwen/Qwen3.6-35B-A3B"
  diagnose_model: "Qwen/Qwen3.6-35B-A3B"
  temperature: 0.0
  max_tokens: 32768

agent:
  max_steps: 100
  max_tool_errors: 5
  trajectory_format: "jsonl"
  self_evolve_timeout_sec: 1800

tasks:
  batch_size: 1
  max_generation_candidates: 3
  candidates_per_signature: 1
  allow_same_repo_transfer: true
  allow_cross_repo_transfer: false

scoring:
  regression_threshold: 0.8
  regression_weight: 0.5
  proposer_target_accuracy: 0.5
  min_parent_solved_tasks: 1
  mode: hgm
  selection:
    strategy: thompson_sampling
    num_pseudo_descendant_evals: 10

evaluation:
  solver_rollouts: 1
  deterministic: true
  level1_timeout_sec: 1200
  level2_timeout_sec: 1200
  max_workers: 1

proposer:
  initial_workflow: repo_chain
  repo_chain:
    min_files: 2
    max_files: 6
    min_mutation_sites: 3
    max_mutation_sites: 8
    context_file_budget: 10
    require_generated_contracts: true
    require_causal_ablation: true
    mutation_backends:
      lm_modify: 1.0
  candidate_timeout_sec: 900
  max_patch_lines: 200
  forbid_test_file_edits: true
  require_f2p: true

execution:
  backend: "subprocess"
  scratch_root: "./scratch_evolve20_repo_chain"
  clean_env: true
  network_disabled: true

paths:
  agent_repo: "./agent_repo_evolve20_repo_chain"
  repo_pool: "./repo_pool"
  runs: "./runs_evolve20_repo_chain"
  task_store: "./task_store_evolve20_repo_chain"
